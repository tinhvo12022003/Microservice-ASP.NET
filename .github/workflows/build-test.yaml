name: ASP.NET CORE Microservice

on: 
  push: 
    branches: [master]
  pull_request:
    branches: [master]

jobs
  build-and-test:
    runs-on: ubuntu-lastest

    steps:
    - name: Chechout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore 

    - name: Build project
      run: dotnet build --configuration Release --no-restore
