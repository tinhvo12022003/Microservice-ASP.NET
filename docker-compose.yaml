version: '3.8'

services:
  userservice:
    build:
      context: .
      dockerfile: src/UserService/Dockerfile
    container_name: userservice
    restart: always
    ports:
      - "3001:8080"          # Mỗi service map port khác nhau
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  productservice:
    build:
      context: .
      dockerfile: src/ProductService/Dockerfile
    container_name: productservice
    restart: always
    ports:
      - "3002:8080"
    env_file:
      - .env

